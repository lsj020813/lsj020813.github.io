      studentized = rstudent(fit), leverage = hatvalues(fit), cooks = cooks.distance(fit))
    vif_base <- sapply(predictors, function(v)
      1 / (1 - summary(lm(reformulate(setdiff(predictors, v), v), analysis_data))$r.squared))
  research_code: |
    vif_research <- car::vif(fit)
    augmented <- broom::augment(fit) |>
      dplyr::select(.fitted, .resid, .std.resid, .hat, .cooksd)
    stopifnot(isTRUE(all.equal(unname(vif_base), unname(vif_research[predictors]))))
  fixture_code: |
    r2 <- cor(x, z)^2
    manual <- 1 / (1 - r2)
    base <- 1 / (1 - summary(lm(x ~ z))$r.squared)
    research <- unname(car::vif(lm(y ~ x + z))[1])
    stopifnot(isTRUE(all.equal(manual, base)), isTRUE(all.equal(base, research)))
